<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Business - FindIt PH</title>
  <script src="config.js"></script>
  <style>
    body { font-family: Arial, sans-serif; max-width: 500px; margin: 0 auto; padding: 15px; }
    .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
    .btn { background: #16a34a; color: white; padding: 14px; border: none; border-radius: 6px; width: 100%; font-size: 16px; cursor: pointer; }
    .free-badge { background: #dcfce7; color: #166534; padding: 8px; border-radius: 6px; text-align: center; margin: 10px 0; }
  </style>
</head>
<body>
  <div class="card">
    <h2>List Your Business on FindIt PH</h2>
    <div class="free-badge">🎉 100% FREE for Early Businesses!</div>
    
    <form id="regForm">
      <input type="text" id="bizName" placeholder="Business Name" required>
      <input type="text" id="bizCat" placeholder="Category e.g. Plumber, Salon" required>
      <input type="text" id="bizLoc" placeholder="Location e.g. Rumuola, GRA" required>
      <input type="tel" id="bizPhone" placeholder="Phone Number 080..." required>
      <input type="tel" id="bizWA" placeholder="WhatsApp Number 23480..." required>
      <button type="submit" class="btn">Submit FREE Listing</button>
    </form>
  </div>

<script>
document.getElementById('regForm').onsubmit = function(e) {
  e.preventDefault();
  const name = document.getElementById('bizName').value;
  const cat = document.getElementById('bizCat').value;
  const loc = document.getElementById('bizLoc').value;
  const phone = document.getElementById('bizPhone').value;
  const wa = document.getElementById('bizWA').value;
  
  const msg = `NEW FindIt PH Listing:%0AName: ${name}%0ACategory: ${cat}%0ALocation: ${loc}%0APhone: ${phone}%0AWhatsApp: ${wa}`;
  window.open(`https://wa.me/${ADMIN_WHATSAPP}?text=${msg}`);
  alert('Submitted! We go review and add you in 24hrs.');
  this.reset();
};
</script>
</body>
</html>
