<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register as Artisan - FindIT PH</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
  <div class="max-w-md mx-auto mt-6 p-6 bg-white rounded-lg shadow-md">
    <h1 class="text-2xl font-bold text-green-600 mb-2">Join FindIT PH</h1>
    <p class="text-sm text-gray-600 mb-6">Real artisans only. Customers will contact you directly.</p>
    
    <form id="registerForm">
      <input type="text" id="firstName" placeholder="First Name" required class="w-full p-3 mb-4 border rounded">
      
      <input type="text" id="surname" placeholder="Surname" required class="w-full p-3 mb-4 border rounded">
      
      <input type="text" id="businessName" placeholder="Business Name (Optional) e.g Mama Chi Tailoring" class="w-full p-3 mb-4 border rounded">
      
      <input type="text" id="skill" placeholder="Your Skill e.g Tailor, Plumber, Electrician" required class="w-full p-3 mb-4 border rounded">
      
      <input type="tel" id="phone" placeholder="WhatsApp Number e.g 0803..." required class="w-full p-3 mb-4 border rounded">
      
      <input type="text" id="area" placeholder="Your Area in Port Harcourt e.g Rumuola, Diobu, GRA" required class="w-full p-3 mb-4 border rounded">
      
      <!-- TERMS AND CONDITIONS -->
      <div class="flex items-start mb-6">
        <input type="checkbox" id="terms" required class="mt-1 mr-3">
        <label for="terms" class="text-sm text-gray-700">
          I confirm all details are true. I agree to the 
          <a href="terms.html" target="_blank" class="text-green-600 underline">Terms & Conditions</a>. 
          I understand FindIT PH will share my contact with paying customers.
        </label>
      </div>
      
      <button type="submit" id="submitBtn" class="w-full bg-green-600 text-white p-3 rounded font-bold">
        Register Now
      </button>
    </form>
    
    <p id="status" class="mt-4 text-center"></p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { firebaseConfig } from './firebase.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const btn = document.getElementById('submitBtn');
      const status = document.getElementById('status');
      
      btn.disabled = true;
      btn.textContent = 'Registering...';
      status.textContent = '';

      try {
        await addDoc(collection(db, "artisans"), {
          firstName: document.getElementById('firstName').value,
          surname: document.getElementById('surname').value,
          businessName: document.getElementById('businessName').value || "None",
          skill: document.getElementById('skill').value,
          phone: document.getElementById('phone').value,
          area: document.getElementById('area').value,
          date: new Date().toISOString(),
          termsAccepted: true
        });
        
        status.className = 'mt-4 text-center text-green-600 font-bold';
        status.textContent = 'Success! You are now listed on FindIT PH. Customers will contact you soon.';
        document.getElementById('registerForm').reset();
        
      } catch (error) {
        status.className = 'mt-4 text-center text-red-600';
        status.textContent = 'Error: ' + error.message;
      }
      
      btn.disabled = false;
      btn.textContent = 'Register Now';
    });
  </script>
</body>
</html>
