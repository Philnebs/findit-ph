<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FindIt-PH - Find Artisans in Port Harcourt</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Segoe UI', Arial, sans-serif; 
      background: #f5f5f5; 
      color: #333;
    }
    .header { 
      background: #0A3D62; 
      color: white; 
      padding: 20px; 
      text-align: center; 
    }
    .search-container {
      background: white;
      padding: 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .search-box {
      display: flex;
      gap: 10px;
      max-width: 600px;
      margin: 0 auto;
    }
    #searchInput {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border: 2px solid #ddd;
      border-radius: 6px;
    }
    #searchBtn {
      padding: 12px 20px;
      font-size: 16px;
      background: #0A3D62;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    #searchBtn:hover { background: #082c48; }
    #results {
      max-width: 800px;
      margin: 20px auto;
      padding: 0 20px;
    }
    .card { 
      background: white; 
      padding: 20px; 
      margin: 15px 0; 
      border-radius: 10px; 
      box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
    }
    .biz-name { font-size: 22px; font-weight: bold; color: #0A3D62; margin-bottom: 8px; }
    .biz-skill { color: #E67E22; font-weight: 600; margin: 5px 0; }
    .biz-area { color: #7f8c8d; margin: 5px 0; }
    .biz-phone { color: #27ae60; font-weight: bold; margin-top: 10px; }
    #loading, #message { text-align: center; padding: 40px; font-size: 18px; color: #888; }
  </style>
</head>
<body>
  <div class="header">
    <h1>FindIt-PH</h1>
    <p>Find trusted artisans in Port Harcourt</p>
  </div>

  <div class="search-container">
    <div class="search-box">
      <input id="searchInput" placeholder="Search skill or area... e.g 'mechanic abuloma'" />
      <button id="searchBtn">Search</button>
    </div>
  </div>

  <div id="loading" style="display: none;">Searching...</div>
  <div id="results">
    <div id="message">Search for artisans above to see results</div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
    import { firebaseConfig } from './config.js';  // <-- THIS LINE IMPORTS YOUR config.js

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const resultsDiv = document.getElementById('results');
    const loadingDiv = document.getElementById('loading');
    const messageDiv = document.getElementById('message');

    async function searchArtisans() {
      const searchTerm = searchInput.value.toLowerCase().trim();
      
      if (!searchTerm) {
        messageDiv.innerHTML = 'Please enter a skill or area to search';
        resultsDiv.innerHTML = '';
        resultsDiv.appendChild(messageDiv);
        return;
      }

      loadingDiv.style.display = 'block';
      resultsDiv.innerHTML = '';

      try {
        const querySnapshot = await getDocs(collection(db, "artisans"));
        loadingDiv.style.display = 'none';
        
        let found = 0;
        let html = '';
        
        querySnapshot.forEach((doc) => {
          const biz = doc.data();
          const bizText = `${biz.businessName || ''} ${biz.skill || ''} ${biz.area || ''} ${biz.bio || ''}`.toLowerCase();
          
          if (bizText.includes(searchTerm)) {
            found++;
            html += `
              <div class="card">
                <div class="biz-name">${biz.businessName || 'No Name'}</div>
                <div class="biz-skill">${biz.skill || 'No Skill Listed'}</div>
                <div class="biz-area">📍 ${biz.area || 'No Area Listed'}</div>
                <div style="margin: 10px 0;">${biz.bio || ''}</div>
                <div class="biz-phone">📞 ${biz.phone || 'No Phone'}</div>
              </div>
            `;
          }
        });

        if (found === 0) {
          resultsDiv.innerHTML = `<div id="message">No artisans found for "${searchTerm}". Try another search.</div>`;
        } else {
          resultsDiv.innerHTML = html;
        }
        
      } catch (error) {
        loadingDiv.style.display = 'none';
        resultsDiv.innerHTML = `<div id="message">Error: ${error.message}</div>`;
        console.error(error);
      }
    }

    searchBtn.addEventListener('click', searchArtisans);
    searchInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') searchArtisans();
    });
  </script>
</body>
</html>
