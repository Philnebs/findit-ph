<!DOCTYPE html>
<html>
<head>
  <title>FindIt-PH</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    .card { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .biz-name { font-size: 20px; font-weight: bold; color: #0A3D62; }
    .biz-skill { color: #555; margin: 5px 0; }
    .biz-area { color: #888; }
    .biz-phone { color: green; font-weight: bold; }
    #loading { text-align: center; font-size: 18px; }
  </style>
</head>
<body>
  <h1>FindIt-PH - Artisans</h1>
  <div id="loading">Loading artisans...</div>
  <div id="results"></div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyDxxxxxxxxxxxxxxxxxxx",
      authDomain: "findit-ph-e1d0f.firebaseapp.com",
      projectId: "findit-ph-e1d0f",
      storageBucket: "findit-ph-e1d0f.appspot.com",
      messagingSenderId: "123456789",
      appId: "1:123456789:web:xxxxxxxx"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadArtisans() {
      try {
        const querySnapshot = await getDocs(collection(db, "artisans"));
        const resultsDiv = document.getElementById('results');
        document.getElementById('loading').style.display = 'none';
        
        if (querySnapshot.empty) {
          resultsDiv.innerHTML = '<p>No artisans found in database.</p>';
          return;
        }

        querySnapshot.forEach((doc) => {
          const biz = doc.data();
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <div class="biz-name">${biz.businessName || 'No Name'}</div>
            <div class="biz-skill">${biz.skill || 'No Skill'}</div>
            <div class="biz-area">${biz.area || 'No Area'}</div>
            <div>${biz.bio || ''}</div>
            <div class="biz-phone">${biz.phone || 'No Phone'}</div>
          `;
          resultsDiv.appendChild(card);
        });
        
      } catch (error) {
        document.getElementById('loading').innerHTML = 'Error: ' + error.message;
        console.error(error);
      }
    }

    loadArtisans();
  </script>
</body>
</html>
